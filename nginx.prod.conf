# nDrama production Nginx configuration
# Domain placeholders: replace DOMAIN with your actual domain (e.g., ndrama.com)
# The provision-vps.sh script does this substitution automatically.

# HTTP -> HTTPS redirect (all subdomains)
server {
    listen 80;
    server_name admin.DOMAIN admin-api.DOMAIN api.DOMAIN;
    return 301 https://$host$request_uri;
}

# Admin Panel (Vue SPA)
server {
    listen 443 ssl http2;
    server_name admin.DOMAIN;

    ssl_certificate /etc/letsencrypt/live/admin.DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Admin API (FastAPI backend)
server {
    listen 443 ssl http2;
    server_name admin-api.DOMAIN;

    ssl_certificate /etc/letsencrypt/live/admin-api.DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin-api.DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 500M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Subscriber/Public API (mobile app)
server {
    listen 443 ssl http2;
    server_name api.DOMAIN;

    ssl_certificate /etc/letsencrypt/live/api.DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
